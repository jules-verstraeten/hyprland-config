# ===========================
# Kitty basisconfiguratie
# ===========================

# Font en grootte
font_family      FiraCode Nerd Font
font_size        14.0

# Transparantie
background_opacity 0.20
active_tab_background_opacity 1.0

# Cursor
cursor_shape     block
cursor_animate   true
cursor_blink     true
cursor_style     beam

# Scrollback buffer
scrollback_lines 10000

# OpenGL rendering voor smooth performance
enable_opengl    yes

# Tabs
hide_tab_bar_if_only_one_tab yes

# Window padding
window_padding_width 5
window_padding_height 5

# Kleurenschema (optioneel, kan aangepast)
include ~/.config/kitty/colors.conf

# Open hyperlinks met xdg-open
map ctrl+click open_link

